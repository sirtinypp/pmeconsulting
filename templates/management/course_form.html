{% extends 'base.html' %}
{% block title %}{{ page_title }} | PME Consulting EU{% endblock %}
{% block page_title %}{{ page_title }}{% endblock %}
{% block brand_context %}Management{% endblock %}

{% block content %}
<div class="card" style="max-width: 800px; margin: 0 auto;">
    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Course Title</label>
            <input type="text" name="title" value="{{ course.title|default:'' }}" class="form-control" placeholder="e.g. German for Doctors: B2" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px;">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
            <div>
                <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">CEFR Level</label>
                <select name="level" class="form-control" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px;">
                    {% for level in levels %}
                    <option value="{{ level }}" {% if course.level == level %}selected{% endif %}>{{ level }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Duration</label>
                <input type="text" name="duration" value="{{ course.duration|default:'' }}" class="form-control" placeholder="e.g. 8 Weeks" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px;">
            </div>
        </div>

        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Description</label>
            <textarea name="description" rows="5" class="form-control" placeholder="Describe the course objectives..." required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; font-family: inherit;">{{ course.description|default:'' }}</textarea>
        </div>

        <div style="margin-bottom: 2rem; display: flex; align-items: center; gap: 0.75rem;">
            <input type="checkbox" name="is_active" id="is_active" {% if course.is_active or not course %}checked{% endif %} style="width: 1.25rem; height: 1.25rem;">
            <label for="is_active" style="font-weight: 600;">Course is active and visible to students</label>
        </div>

        <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-primary" style="flex: 1; justify-content: center; padding: 1rem;">
                {% if course %}Save Changes{% else %}Create Course{% endif %}
            </button>
            <a href="{% url 'dashboard' %}" class="btn" style="flex: 1; justify-content: center; padding: 1rem; border: 1px solid var(--border);">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
