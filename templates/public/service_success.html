{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiry Received | PME Learning</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="stylesheet" href="{% static 'css/public.css' %}">
    <style>
        .success-card { max-width: 500px; margin: 80px auto; background: white; padding: 60px 40px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .success-icon { font-size: 64px; color: #10B981; margin-bottom: 20px; }
    </style>
</head>
<body style="background: #F8FAFC;">
    <div class="container">
        <div class="success-card">
            <div class="success-icon">✅</div>
            <h1 style="color: #0F172A; margin-bottom: 16px;">Inquiry Received!</h1>
            <p style="color: #64748B; margin-bottom: 30px; line-height: 1.6;">Thank you for reaching out. We have received your consultation request and our team will get back to you via email within 24 hours.</p>
            <a href="{% url 'public_index' %}" class="btn btn-primary">Return to Homepage</a>
        </div>
    </div>
</body>
</html>
